name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd parsers/python
          pip install -e ".[test]"

      - name: Run tests
        run: |
          cd parsers/python
          python -m pytest tests/ -v

      - name: Validate examples
        run: |
          cd parsers/python
          for f in ../../examples/*/knowledge.yaml; do
            python -m kcp "$f"
          done

  java-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Run tests
        run: |
          cd parsers/java
          mvn test -q

  java-bridge-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Install KCP parser
        run: |
          cd parsers/java
          mvn install -q

      - name: Run tests
        run: |
          cd bridge/java
          mvn test -q

  python-bridge-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd bridge/python
          pip install -e ../../parsers/python
          pip install -e ".[test]"

      - name: Run tests
        run: |
          cd bridge/python
          python -m pytest tests/ -v

      - name: Validate examples via CLI
        run: |
          cd bridge/python
          for f in ../../examples/*/knowledge.yaml; do
            python -m kcp_mcp "$f" --help > /dev/null
          done

      - name: Smoke-test sub-manifests
        run: |
          cd bridge/python
          output=$(timeout 5s python -m kcp_mcp \
            tests/fixtures/minimal/knowledge.yaml \
            --sub-manifests tests/fixtures/sub/knowledge.yaml \
            < /dev/null 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "loaded sub-manifest" \
            && echo "sub-manifests: PASS" \
            || { echo "sub-manifests: FAIL"; exit 1; }

  typescript-bridge-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: |
          cd bridge/typescript
          npm install

      - name: Build
        run: |
          cd bridge/typescript
          npm run build

      - name: Run tests
        run: |
          cd bridge/typescript
          npm test

      - name: Validate examples via CLI
        run: |
          cd bridge/typescript
          for f in ../../examples/*/knowledge.yaml; do
            node dist/cli.js "$f" --help > /dev/null
          done

      - name: Smoke-test sub-manifests
        run: |
          cd bridge/typescript
          output=$(timeout 5s node dist/cli.js \
            tests/fixtures/minimal/knowledge.yaml \
            --sub-manifests ../sub/knowledge.yaml \
            < /dev/null 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "loaded sub-manifest" \
            && echo "sub-manifests: PASS" \
            || { echo "sub-manifests: FAIL"; exit 1; }

  conformance-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Build parser
        run: |
          cd parsers/java
          mvn install -q

      - name: Compile conformance runner
        run: |
          SNAKEYAML=$(find ~/.m2/repository/org/yaml/snakeyaml -name "snakeyaml-2.6.jar" | head -1)
          javac -cp parsers/java/target/classes:${SNAKEYAML} \
            -d conformance/runners/java \
            conformance/runners/java/ConformanceRunner.java

      - name: Run conformance tests
        run: |
          SNAKEYAML=$(find ~/.m2/repository/org/yaml/snakeyaml -name "snakeyaml-2.6.jar" | head -1)
          java -cp conformance/runners/java:parsers/java/target/classes:${SNAKEYAML} \
            no.cantara.kcp.conformance.ConformanceRunner conformance/fixtures

  conformance-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install parser
        run: pip install -e parsers/python

      - name: Run conformance tests
        run: python conformance/runners/python/conformance_runner.py conformance/fixtures

  conformance-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          cd bridge/typescript
          npm install

      - name: Build bridge
        run: |
          cd bridge/typescript
          npm run build

      - name: Run conformance tests
        run: |
          cd bridge/typescript
          npx tsx ../../conformance/runners/typescript/conformance_runner.ts ../../conformance/fixtures
