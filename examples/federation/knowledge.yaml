# Example: Enterprise Federation Hub Manifest
# Demonstrates the DAG federation model from KCP v0.9 §3.6.
#
# The hub manifest aggregates knowledge from multiple sub-manifests.
# Agents discover the hub, then selectively fetch sub-manifests based on
# unit intents and triggers.

kcp_version: "0.9"
project: acme-knowledge-hub
version: 1.0.0
updated: "2026-03-10"
language: en

# --- Federation: DAG model (§3.6) --------------------------------------------
# Any manifest MAY declare sub-manifests. The topology is a DAG with local
# authority — not hub-and-spoke. Cycle detection uses a visited URL set.

manifests:
  - id: platform
    url: "https://docs.acme.com/platform/knowledge.yaml"
    label: "Core Platform"
    relationship: foundation
    update_frequency: weekly

  - id: security
    url: "https://docs.acme.com/security/knowledge.yaml"
    label: "Security & Compliance"
    relationship: governs
    update_frequency: daily

  - id: ml-ops
    url: "https://docs.acme.com/ml-ops/knowledge.yaml"
    label: "ML Operations"
    relationship: peer
    update_frequency: weekly

  - id: oss-lib
    url: "https://github.com/acme/open-source-lib/raw/main/knowledge.yaml"
    label: "Open Source Library"
    relationship: child
    update_frequency: monthly
    local_mirror: "./mirrors/oss-lib.yaml"

  - id: legacy-docs
    url: "https://docs.acme.com/legacy/knowledge.yaml"
    label: "Legacy Documentation (pre-v2)"
    relationship: archive
    update_frequency: never

  - id: partner-api
    url: "https://partner.acme.com/api/knowledge.yaml"
    label: "Partner API Portal"
    relationship: peer
    update_frequency: daily
    auth:
      methods:
        - type: oauth2
          issuer: "https://auth.partner.acme.com"
          scopes: ["read:knowledge"]

# --- Hub-level units ----------------------------------------------------------
# The hub can also declare its own units (e.g. cross-cutting documentation).

units:
  - id: onboarding
    path: docs/onboarding.md
    intent: "How do new engineers get started across all Acme projects?"
    scope: global
    audience: [human, developer]
    triggers: [onboarding, getting started, new hire, setup]
    external_depends_on:
      - manifest: platform
        unit: quickstart
        on_failure: warn
      - manifest: security
        unit: access-policy
        on_failure: degrade

  - id: architecture-principles
    path: docs/architecture-principles.md
    intent: "What are the cross-project architecture principles at Acme?"
    scope: global
    audience: [developer, architect, agent]
    triggers: [architecture, principles, standards, guidelines]

  - id: deployment-guide
    path: docs/deployment-guide.md
    intent: "How to deploy services across the Acme platform"
    scope: project
    audience: [developer, agent]
    triggers: [deploy, release, rollout, ci/cd]
    external_depends_on:
      - manifest: platform
        unit: infra-config
        on_failure: skip

# --- Intra-manifest relationships --------------------------------------------

relationships:
  - from: onboarding
    to: architecture-principles
    type: context
  - from: architecture-principles
    to: deployment-guide
    type: enables

# --- Cross-manifest relationships (§3.6) ------------------------------------
# These express relationships between units in different manifests.

external_relationships:
  - from_unit: architecture-principles
    to_manifest: security
    to_unit: security-standards
    type: governs
  - from_manifest: platform
    from_unit: api-gateway
    to_unit: deployment-guide
    type: enables
  - from_unit: deployment-guide
    to_manifest: ml-ops
    to_unit: model-serving
    type: context
  # Cross-sub-manifest relationship (both from_manifest and to_manifest specified)
  - from_manifest: platform
    from_unit: core-sdk
    to_manifest: ml-ops
    to_unit: ml-sdk
    type: enables
  # supersedes — new security standards replace legacy docs
  - from_manifest: security
    from_unit: security-standards-v3
    to_manifest: legacy-docs
    to_unit: security-standards-v2
    type: supersedes
  # contradicts — partner API auth model conflicts with internal policy
  - from_manifest: partner-api
    from_unit: auth-model
    to_manifest: security
    to_unit: internal-auth-policy
    type: contradicts
