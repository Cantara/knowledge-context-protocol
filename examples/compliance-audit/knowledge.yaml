kcp_version: "0.8"
project: patient-data-platform
version: "1.0.0"
updated: "2026-03-09"

compliance:
  sensitivity: confidential
  data_residency:
    - EU
  regulations:
    - GDPR
    - NIS2

auth:
  methods:
    - type: oauth2
      issuer: https://auth.example.health
      scopes:
        - patient:read
        - patient:write
        - audit:read

trust:
  audit:
    agent_must_log: true
    require_trace_context: true

units:
  - id: patient-records
    path: docs/api/patient-records.md
    intent: Read and update patient demographic and clinical records
    scope: module
    access: restricted
    auth_scope: patient:read
    audience: [developer, operator]
    compliance:
      sensitivity: restricted
      data_residency:
        - EU
      regulations:
        - GDPR

  - id: appointment-scheduler
    path: docs/api/appointments.md
    intent: Schedule and manage patient appointments
    scope: module
    access: restricted
    auth_scope: patient:read
    audience: [developer, operator]
    compliance:
      sensitivity: confidential
      data_residency:
        - EU

  - id: analytics-dashboard
    path: docs/analytics/README.md
    intent: View aggregated, anonymised patient flow and outcome statistics
    scope: module
    access: authenticated
    audience: [operator]
    compliance:
      sensitivity: internal
      data_residency:
        - EU

  - id: audit-log
    path: docs/compliance/audit-log.md
    intent: Export agent access log for NIS2 and GDPR audit purposes
    scope: module
    access: restricted
    auth_scope: audit:read
    audience: [operator]
    compliance:
      sensitivity: restricted
      data_residency:
        - EU
      regulations:
        - GDPR
        - NIS2
