# Example: Automated Generator — Discovery Provenance
# Project: transit-portal-discovered
#
# Demonstrates KCP v0.12 discovery block (SPEC.md §3.9, §4.18):
#   - Manifest generated by an automated crawler (e.g. kcp-triage)
#   - Units express epistemic state: verified / observed / rumored
#   - Normative rule: rumored MUST declare confidence < 0.5
#   - Generators SHOULD set discovery.source at root level as default
#   - Enables consumers to filter by confidence before loading

kcp_version: "0.12"
project: transit-portal-discovered
version: "1.0.0"
updated: "2026-03-19"
language: en
indexing: read-only

# Root-level discovery defaults — inherited by all units unless overridden
discovery:
  source: web_traversal
  observed_at: "2026-03-19T10:00:00Z"

rate_limits:
  note: "Respect robots.txt crawl-delay; minimum 500ms between requests"

units:
  # Fully verified — crawled and cross-referenced with official docs
  - id: site-overview
    path: CLAUDE.md
    intent: "What is transit.example.com and how should an AI agent interact with it?"
    scope: global
    audience: [agent, developer]
    validated: "2026-03-19"
    hints:
      load_strategy: eager
      priority: critical
    discovery:
      verification_status: verified
      source: manual
      confidence: 1.0
      verified_at: "2026-03-19T10:05:00Z"

  # Observed — seen in crawl, URL patterns confirmed, no official docs found
  - id: journey-planner
    path: skills/plan-trip.md
    intent: "How do I plan a trip using the journey planner at transit.example.com?"
    scope: module
    audience: [agent]
    depends_on: [site-overview]
    triggers: [plan trip, journey, route, departure, arrival]
    hints:
      load_strategy: lazy
      priority: supplementary
    discovery:
      verification_status: observed
      source: web_traversal
      confidence: 0.85
      observed_at: "2026-03-19T10:02:00Z"

  # Observed — referenced in HTML but not crawled (external SPA subdomain)
  - id: real-time-api
    path: apis/real-time.md
    intent: "What is the real-time departure API at transit.example.com?"
    scope: module
    audience: [agent, developer]
    depends_on: [site-overview]
    hints:
      load_strategy: lazy
      priority: supplementary
    discovery:
      verification_status: observed
      source: web_traversal
      confidence: 0.62
      observed_at: "2026-03-19T10:03:00Z"

  # Rumored — inferred from page text, not directly observed
  # MUST have confidence < 0.5 per KCP normative rule
  - id: ticket-booking-api
    path: unknowns.md
    intent: "Does transit.example.com expose a ticket booking API?"
    scope: module
    audience: [developer]
    hints:
      load_strategy: lazy
      priority: reference
    discovery:
      verification_status: rumored
      source: llm_inference
      confidence: 0.35
      observed_at: "2026-03-19T10:04:00Z"

  # Deprecated — API confirmed retired, kept for historical reference
  - id: legacy-gtfs-feed
    path: apis/legacy-gtfs.md
    intent: "What was the legacy GTFS feed endpoint (retired 2025)?"
    scope: module
    audience: [developer]
    hints:
      load_strategy: never
      priority: reference
    discovery:
      verification_status: deprecated
      source: manual
      confidence: 1.0
      verified_at: "2025-06-01T00:00:00Z"
