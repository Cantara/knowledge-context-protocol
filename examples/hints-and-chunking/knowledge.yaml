# Example: Context Window Hints and Chunking
# Demonstrates token_estimate, load_strategy, summary_available/summary_unit/summary_of,
# and chunking fields from SPEC.md §4.10.

kcp_version: "0.7"
project: hints-and-chunking-example
version: 1.0.0
updated: "2026-03-08"

hints:
  total_token_estimate: 42000
  unit_count: 6
  recommended_entry_point: architecture-tldr
  has_summaries: true
  has_chunks: true

units:

  # --- Summary relationship ---------------------------------------------------
  # architecture-overview is the full document (18,000 tokens).
  # architecture-tldr is the summary (500 tokens).
  # Agents should load the TL;DR first, then fetch the full version only if needed.

  - id: architecture-overview
    path: docs/architecture.md
    intent: "What is the system architecture — components, data flow, deployment topology?"
    scope: global
    audience: [developer, architect, agent]
    hints:
      token_estimate: 18000
      load_strategy: lazy
      priority: supplementary
      density: dense
      summary_available: true
      summary_unit: architecture-tldr

  - id: architecture-tldr
    path: docs/architecture-tldr.md
    intent: "What is the system architecture in 400 words?"
    scope: global
    audience: [developer, architect, agent]
    hints:
      token_estimate: 500
      load_strategy: eager
      priority: critical
      summary_of: architecture-overview

  # --- Chunking ---------------------------------------------------------------
  # The API reference is split into 3 sequential chunks.
  # The parent declares chunked: true and chunk_count: 3.
  # Each chunk declares chunk_of, chunk_index, total_chunks, and chunk_topic.

  - id: api-reference
    path: docs/api-reference.md
    intent: "Complete API reference — all endpoints, request/response schemas."
    scope: module
    audience: [developer, agent]
    hints:
      token_estimate: 20000
      load_strategy: never
      priority: reference
      density: dense
      chunked: true
      chunk_count: 3

  - id: api-reference-chunk-1
    path: docs/api-reference-part1.md
    intent: "API reference — authentication and user endpoints."
    scope: module
    audience: [developer, agent]
    hints:
      token_estimate: 7000
      load_strategy: lazy
      chunk_of: api-reference
      chunk_index: 1
      total_chunks: 3
      chunk_topic: "Authentication and user management endpoints"

  - id: api-reference-chunk-2
    path: docs/api-reference-part2.md
    intent: "API reference — resource CRUD endpoints."
    scope: module
    audience: [developer, agent]
    hints:
      token_estimate: 7000
      load_strategy: lazy
      chunk_of: api-reference
      chunk_index: 2
      total_chunks: 3
      chunk_topic: "Resource CRUD endpoints"

  - id: api-reference-chunk-3
    path: docs/api-reference-part3.md
    intent: "API reference — admin and reporting endpoints."
    scope: module
    audience: [developer, agent]
    hints:
      token_estimate: 6000
      load_strategy: lazy
      chunk_of: api-reference
      chunk_index: 3
      total_chunks: 3
      chunk_topic: "Admin and reporting endpoints"

relationships:
  - from: architecture-tldr
    to: architecture-overview
    type: context
  - from: api-reference-chunk-1
    to: api-reference
    type: context
  - from: api-reference-chunk-2
    to: api-reference
    type: context
  - from: api-reference-chunk-3
    to: api-reference
    type: context
