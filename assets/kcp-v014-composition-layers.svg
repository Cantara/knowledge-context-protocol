<svg width="840" height="380" viewBox="0 0 840 380" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="840" height="380" fill="#ffffff"/>

  <!-- Title -->
  <text x="420" y="30" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#111827">KCP RFC-0014 — Manifest Composition</text>

  <!-- ─────────────────────────────────────────── -->
  <!-- LEFT: Base Manifest                         -->
  <!-- ─────────────────────────────────────────── -->
  <text x="130" y="58" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#6b7280">platform/knowledge.yaml</text>

  <!-- Unit stack (80 units, shown as layered cards) -->
  <!-- Shadow cards at bottom -->
  <rect x="50" y="72" width="160" height="230" rx="4" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
  <rect x="54" y="68" width="160" height="230" rx="4" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
  <!-- Main card -->
  <rect x="58" y="64" width="160" height="230" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>

  <text x="138" y="84" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#374151">Base Manifest</text>
  <text x="138" y="98" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#6b7280">80 units</text>

  <!-- Unit blocks in base -->
  <rect x="70" y="108" width="136" height="16" rx="2" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="138" y="120" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#1e40af">submit-expense-report</text>

  <rect x="70" y="128" width="136" height="16" rx="2" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="138" y="140" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#1e40af">data-retention-policy</text>

  <rect x="70" y="148" width="136" height="16" rx="2" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="138" y="160" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#1e40af">user-consent-flow</text>

  <rect x="70" y="168" width="136" height="16" rx="2" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="138" y="180" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#991b1b">us-state-tax-calc</text>

  <rect x="70" y="188" width="136" height="16" rx="2" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="138" y="200" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#991b1b">us-hipaa-audit-log</text>

  <rect x="70" y="208" width="136" height="16" rx="2" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="138" y="220" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#991b1b">us-ccpa-opt-out</text>

  <rect x="70" y="228" width="136" height="16" rx="2" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="138" y="240" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#1e40af">deploy-overview</text>

  <text x="138" y="262" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#9ca3af">… 73 more units …</text>

  <text x="138" y="284" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#6b7280">maintained by: platform team</text>

  <!-- ─────────────────────────────────────────── -->
  <!-- CENTRE: Overlay                             -->
  <!-- ─────────────────────────────────────────── -->
  <text x="420" y="58" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#6b7280">eu-compliance/knowledge.yaml</text>

  <rect x="328" y="64" width="184" height="230" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="420" y="84" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#92400e">Overlay</text>
  <text x="420" y="98" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#a16207">composition block</text>

  <!-- includes section -->
  <rect x="340" y="108" width="160" height="30" rx="2" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="420" y="120" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" font-weight="bold" fill="#78350f">includes:</text>
  <text x="420" y="133" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#92400e">./platform/knowledge.yaml</text>

  <!-- overrides section -->
  <rect x="340" y="145" width="160" height="46" rx="2" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="420" y="157" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" font-weight="bold" fill="#064e3b">overrides:</text>
  <text x="420" y="169" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#065f46">data-retention-policy</text>
  <text x="420" y="181" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#065f46">user-consent-flow</text>

  <!-- excludes section -->
  <rect x="340" y="198" width="160" height="56" rx="2" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="420" y="210" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" font-weight="bold" fill="#7f1d1d">excludes:</text>
  <text x="420" y="222" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#991b1b">us-state-tax-calc</text>
  <text x="420" y="234" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#991b1b">us-hipaa-audit-log</text>
  <text x="420" y="246" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#991b1b">us-ccpa-opt-out</text>

  <!-- local units section -->
  <rect x="340" y="261" width="160" height="26" rx="2" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="420" y="273" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" font-weight="bold" fill="#14532d">units: (local)</text>
  <text x="420" y="283" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#166534">gdpr-data-map + 1 more</text>

  <!-- ─────────────────────────────────────────── -->
  <!-- RIGHT: Composed Result                      -->
  <!-- ─────────────────────────────────────────── -->
  <text x="700" y="58" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#6b7280">composed result (agent sees)</text>

  <rect x="618" y="64" width="160" height="230" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="698" y="84" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#14532d">Composed</text>
  <text x="698" y="98" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#166534">79 units</text>

  <rect x="630" y="108" width="136" height="16" rx="2" fill="#bbf7d0" stroke="#86efac" stroke-width="1"/>
  <text x="698" y="120" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#14532d">submit-expense-report</text>

  <rect x="630" y="128" width="136" height="16" rx="2" fill="#fef9c3" stroke="#fde047" stroke-width="1"/>
  <text x="698" y="140" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#713f12">data-retention-policy ✎</text>

  <rect x="630" y="148" width="136" height="16" rx="2" fill="#fef9c3" stroke="#fde047" stroke-width="1"/>
  <text x="698" y="160" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#713f12">user-consent-flow ✎</text>

  <rect x="630" y="168" width="136" height="16" rx="2" fill="#bbf7d0" stroke="#86efac" stroke-width="1"/>
  <text x="698" y="180" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#14532d">deploy-overview</text>

  <text x="698" y="202" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#9ca3af">… 73 inherited …</text>

  <rect x="630" y="212" width="136" height="16" rx="2" fill="#bbf7d0" stroke="#4ade80" stroke-width="1.5"/>
  <text x="698" y="224" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#166534">gdpr-data-map (local)</text>

  <text x="698" y="252" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#6b7280">us-* units: suppressed</text>
  <text x="698" y="264" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#6b7280">✎ = overridden fields</text>
  <text x="698" y="276" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#6b7280">green = local unit</text>

  <!-- ─────────────────────────────────────────── -->
  <!-- Arrows                                      -->
  <!-- ─────────────────────────────────────────── -->
  <defs>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9ca3af"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Base → Overlay (includes) -->
  <line x1="218" y1="130" x2="322" y2="130" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowB)"/>
  <text x="270" y="124" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#9ca3af">includes</text>

  <!-- Overlay → Result -->
  <line x1="512" y1="179" x2="612" y2="179" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="562" y="173" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#22c55e">resolves to</text>

  <!-- ─────────────────────────────────────────── -->
  <!-- Legend                                      -->
  <!-- ─────────────────────────────────────────── -->
  <rect x="218" y="322" width="404" height="40" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="232" y="334" width="12" height="12" rx="2" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="250" y="344" font-family="'Courier New', monospace" font-size="9" fill="#374151">inherited</text>
  <rect x="312" y="334" width="12" height="12" rx="2" fill="#fef9c3" stroke="#fde047" stroke-width="1"/>
  <text x="330" y="344" font-family="'Courier New', monospace" font-size="9" fill="#374151">overridden</text>
  <rect x="404" y="334" width="12" height="12" rx="2" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="422" y="344" font-family="'Courier New', monospace" font-size="9" fill="#374151">excluded</text>
  <rect x="488" y="334" width="12" height="12" rx="2" fill="#bbf7d0" stroke="#4ade80" stroke-width="1.5"/>
  <text x="506" y="344" font-family="'Courier New', monospace" font-size="9" fill="#374151">local unit</text>

  <!-- Footer -->
  <text x="420" y="368" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#9ca3af">Knowledge Context Protocol — github.com/cantara/knowledge-context-protocol</text>
</svg>
