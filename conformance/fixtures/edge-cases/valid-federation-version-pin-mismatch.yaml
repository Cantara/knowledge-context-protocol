# Edge case — version_pin set without version_policy (should produce warning, not error)
kcp_version: "0.10"
project: test-version-pin-mismatch
version: "1.0.0"

manifests:
  - id: platform
    url: "https://example.com/platform/knowledge.yaml"
    label: "Platform Team"
    relationship: foundation
    version_pin: "2.1.0"
    # version_policy intentionally omitted — validators SHOULD warn and default to "compatible"

units:
  - id: overview
    path: docs/overview.md
    intent: "Project overview"
    scope: global
    audience: [developer, agent]

relationships: []
