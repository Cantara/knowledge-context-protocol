# Level 3 — valid rate_limits block at root and unit level (§4.15)
kcp_version: "0.9"
project: test-rate-limits
version: "1.0.0"

rate_limits:
  default:
    requests_per_minute: 60
    requests_per_day: 1000

units:
  - id: api-reference
    path: docs/api.md
    intent: "REST API endpoint reference"
    scope: module
    audience: [agent, developer]
    rate_limits:
      default:
        requests_per_minute: 10
        requests_per_day: 200
